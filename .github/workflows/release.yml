# Automated release + npm publish for @plan-fi/imports.
#
# Flow: conventional-commit changes land on main → release-please maintains a
# "release PR" that bumps the version (semver from commit types) and writes the
# CHANGELOG. Merging that PR cuts a GitHub Release *and*, in the same run,
# publishes the new version to npm with the generated notes. One approval (the
# PR merge) = a fully-noted, versioned, published release.
name: Release
on:
  push:
    branches: [main]
permissions:
  contents: write
  pull-requests: write
  id-token: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      # Everything below runs ONLY on the push that merges the release PR.
      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}
      - uses: actions/setup-node@v4
        if: ${{ steps.release.outputs.release_created }}
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
        if: ${{ steps.release.outputs.release_created }}
      - run: node --test
        if: ${{ steps.release.outputs.release_created }}
      - run: npm publish --access public
        if: ${{ steps.release.outputs.release_created }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
